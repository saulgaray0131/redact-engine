name: Backend PR Check

on:
  pull_request:
    branches: [main]
    paths:
      - "RedactEngine.ApiService/**"
      - "RedactEngine.AppHost/**"
      - "RedactEngine.Application/**"
      - "RedactEngine.Domain/**"
      - "RedactEngine.Infrastructure/**"
      - "RedactEngine.ServiceDefaults/**"
      - "RedactEngine.Shared/**"
      - "RedactEngine.Worker/**"
      - "RedactEngine.Architecture.Tests/**"
      - "RedactEngine.sln"
      - ".github/workflows/backend-pr.yml"

concurrency:
  group: backend-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
