name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "RedactEngine.Web/**"
      - ".github/workflows/frontend-cicd.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: frontend-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_LOCATION: "RedactEngine.Web"
  OUTPUT_LOCATION: "dist"

jobs:
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.static_web_app_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: RedactEngine.Web/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: RedactEngine.Web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ env.APP_LOCATION }}

      - name: Generate API client
        run: pnpm openapi-ts
        working-directory: ${{ env.APP_LOCATION }}

      - name: Lint
        run: pnpm lint
        working-directory: ${{ env.APP_LOCATION }}

      - name: Build
        run: pnpm build
        working-directory: ${{ env.APP_LOCATION }}

      - name: Debug deploy directory
        run: |
          echo "=== Resolved app_location: /${{ env.APP_LOCATION }}/${{ env.OUTPUT_LOCATION }} ==="
          echo "=== Contents of ${{ env.APP_LOCATION }}/${{ env.OUTPUT_LOCATION }}: ==="
          ls -la ${{ env.APP_LOCATION }}/${{ env.OUTPUT_LOCATION }}
          echo "=== Total size of app_location: ==="
          du -sh ${{ env.APP_LOCATION }}/${{ env.OUTPUT_LOCATION }}
          echo "=== Total size of ${{ env.APP_LOCATION }} (parent): ==="
          du -sh ${{ env.APP_LOCATION }}
          echo "=== Largest dirs under ${{ env.APP_LOCATION }}: ==="
          du -h --max-depth=1 ${{ env.APP_LOCATION }} | sort -rh | head -10

      - name: Deploy to Azure Static Web Apps (Production)
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/${{ env.APP_LOCATION }}/${{ env.OUTPUT_LOCATION }}"
          skip_app_build: true
